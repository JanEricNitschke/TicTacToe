# This workflow will compile the cobol version of tictactoe

name: cobol

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tictactoe_cobol
    steps:
    - name: Checkout repo
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Setup Cobol
      uses: fabasoad/setup-cobol-action@bdd06ad15f6c2a9df376bc25acbdc361aea50831 # v1.6.2
    - name: Compile.
      run: |
        cobc -x tictactoe_cobol.cob
    - name: Run
      run: |
        ./tictactoe_cobol < input.txt
