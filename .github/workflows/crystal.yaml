# This workflow will run the tests on the crystal version of tictactoe

name: crystal

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tictactoe_crystal
    steps:
    - name: Checkout repo
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Install Crystal
      uses: crystal-lang/install-crystal@d8ef131ecec0352ce0e39b81b0a6d95def58fe2f # v1.9.2
    - name: Check formatting
      run: crystal tool format --check
    - name: Build
      run: crystal build src/tictactoe_crystal.cr
    - name: Run tests
      run: crystal spec
    - name: Run
      run: crystal run src/tictactoe_crystal.cr -- --X-strength=4 --O-strength=4
