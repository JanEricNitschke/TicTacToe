# This workflow will run the tests on the lua version of tictactoe

name: lua

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tictactoe_lua
    steps:
    - name: Checkout repo
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        repository: bluebird75/luaunit
        path: luaunit
        clean: false
        sparse-checkout: |
          luaunit.lua
        sparse-checkout-cone-mode: false
    - uses: leafo/gh-actions-lua@6919171ccf181b826f44b9bca76307b577217377 # v13.0.0
      with:
        luaVersion: "5.4"
    - name: Test
      run: |
        mv ../luaunit/luaunit.lua .
        lua tests/test_tictactoe.lua
