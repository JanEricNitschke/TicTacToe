# This workflow does stuff on the smalltalk version

name: smalltalk

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tictactoe_smalltalk
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hpi-swa/setup-smalltalkCI@a104c9a0c7d4226f32474ba28b15bba774fb24ed # v1.5.0
        id: smalltalkci
        with:
          smalltalk-image: 'Squeak64-trunk'
      - run: echo "SmalltalkCI is ready"
