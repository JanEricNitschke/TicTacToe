# This workflow will compile the julia version of tictactoe

name: julia

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tictactoe_julia
    steps:
    - name: Checkout repo
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Setup Julia
      uses: julia-actions/setup-julia@f6f565d9f7cf12f53dc8045742460d6260ad3b39 # v3.0.1
    - name: Compile, test and run.
      run: |
        julia --project=. test/runtests.jl
        julia --project=. test/runexample.jl -X 3 -O 3
