# This workflow will run the build on the C version of tictactoe

name: C

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tictactoe_c
    steps:
    - name: Checkout repo
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Build
      run: |
        make
    - name: Test
      run: |
        make test
    - name: Run
      run: |
        ./bin/tictactoe_c -X 0 -O 0
  python-ext:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tictactoe_c
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Build
        run: |
          pip install setuptools
          make
      - name: Run Python
        run: make run_python
      - name: Create stubs
        run: |
          pip install mypy
          stubgen -p tictactoe_c -o stubs
      - name: Upload stubs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
            name: Stub-file-${{ matrix.python-version }}
            path: ./tictactoe_c/stubs/
